services:
  mnop-postgres:
    image: postgres:17
    container_name: mnop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mnop_db
      POSTGRES_USER: mnop_user
      POSTGRES_PASSWORD: mnop_password
      TZ: Asia/Jakarta
    ports:
      - "5432:5432"
    volumes:
      - mnop_postgres_data:/var/lib/postgresql/data
    networks:
      - mnop_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnop_user -d mnop_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mnop-redis:
    image: redis:7.4-alpine
    container_name: mnop_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - mnop_redis_data:/data
    networks:
      - mnop_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mnop-adminer:
    image: adminer:latest
    container_name: mnop_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - mnop_network
    depends_on:
      mnop-postgres:
        condition: service_healthy

volumes:
  mnop_postgres_data:
  mnop_redis_data:

networks:
  mnop_network:
    driver: bridge